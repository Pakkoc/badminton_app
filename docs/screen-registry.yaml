# 화면 레지스트리 (Single Source of Truth)
# 모든 화면의 메타 정보를 한 곳에서 관리한다.
# 변경 시 이 파일을 먼저 수정하고, /sync 스킬로 전체 문서를 동기화한다.
#
# 필드 설명:
#   id: 화면 고유 ID (역할 접두사 포함: customer-, owner-)
#   name: 화면 표시 이름
#   description: 화면 목적 한줄 요약
#   role: common | customer | shop_owner
#   pencil_id: Pencil 디자인 프레임 ID
#   spec_file: UI 스펙 문서 경로
#
# 네비게이션 정보(nav_to/nav_from)는 Pencil 디자인이 SOT이다.
# /design-sync 스킬이 Pencil → UI 스펙으로 네비게이션을 동기화한다.

screens:
  # ─── 공통 (온보딩) ───
  splash:
    name: "스플래시"
    description: "앱 시작 시 로고 표시 후 로그인 상태에 따라 자동 라우팅"
    role: common
    pencil_id: 75vDs
    spec_file: docs/ui-specs/splash.md

  login:
    name: "로그인"
    description: "소셜 로그인 (카카오/네이버/Gmail)"
    role: common
    pencil_id: hI7MJ
    spec_file: docs/ui-specs/login.md

  profile-setup:
    name: "프로필 설정"
    description: "소셜 로그인 후 신규 사용자 역할/이름/연락처 입력"
    role: common
    pencil_id: s2pzz
    spec_file: docs/ui-specs/signup.md

  owner-shop-signup:
    name: "샵 등록"
    description: "사장님 가입 2단계 - 샵 기본 정보 등록"
    role: shop_owner
    pencil_id: PdstH
    spec_file: docs/ui-specs/shop-signup.md

  # ─── 고객 흐름 ───
  customer-home:
    name: "고객 홈"
    description: "진행 중 작업 목록 및 요약 통계"
    role: customer
    pencil_id: 0b6dS
    spec_file: docs/ui-specs/customer-home.md

  customer-order-detail:
    name: "작업 상세"
    description: "거트 작업의 상세 정보 및 진행 상태"
    role: customer
    pencil_id: l7Ghq
    spec_file: docs/ui-specs/order-detail.md

  customer-order-history:
    name: "작업 이력"
    description: "완료된 거트 작업 이력 목록"
    role: customer
    pencil_id: cdfXb
    spec_file: docs/ui-specs/order-history.md

  customer-shop-search:
    name: "주변 샵 검색"
    description: "네이버 지도 기반 주변 거트 샵 검색"
    role: customer
    pencil_id: KMb0t
    spec_file: docs/ui-specs/shop-search.md

  customer-shop-detail:
    name: "샵 상세"
    description: "샵 정보, 공지/이벤트/재고 탭"
    role: customer
    pencil_id: S4mUF
    spec_file: docs/ui-specs/shop-detail.md

  customer-notifications:
    name: "알림"
    description: "주문 상태 변경, 새 게시글 등 알림 목록"
