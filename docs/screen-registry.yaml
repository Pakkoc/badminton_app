    pencil_id: fKRz8
    spec_file: docs/ui-specs/notifications.md

  customer-post-list:
    name: "게시글 목록"
    description: "샵의 공지사항/이벤트 게시글 목록"
    role: customer
    pencil_id: 0htm7
    spec_file: docs/ui-specs/post-list.md

  customer-post-detail:
    name: "게시글 상세"
    description: "게시글 전문 보기 (공지사항/이벤트)"
    role: customer
    pencil_id: gkn1s
    spec_file: docs/ui-specs/post-detail.md

  customer-mypage:
    name: "마이페이지"
    description: "내 정보 확인 및 설정"
    role: customer
    pencil_id: xz11L
    spec_file: docs/ui-specs/mypage.md

  customer-qr-order:
