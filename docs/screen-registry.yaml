# 화면 레지스트리 (Single Source of Truth)
# 모든 화면의 메타 정보를 한 곳에서 관리한다.
# 변경 시 이 파일을 먼저 수정하고, /sync 스킬로 전체 문서를 동기화한다.
#
# 필드 설명:
#   id: 화면 고유 ID (역할 접두사 포함: customer-, owner-)
#   name: 화면 표시 이름
#   description: 화면 목적 한줄 요약
#   role: common | customer | shop_owner
#   pencil_id: Pencil 디자인 프레임 ID
#   spec_file: UI 스펙 문서 경로
#   nav_to: 이 화면에서 이동 가능한 화면 ID 목록
#   nav_from: 이 화면으로 진입하는 화면 ID 목록

screens:
  # ─── 공통 (온보딩) ───
  splash:
    name: "스플래시"
    description: "앱 시작 시 로고 표시 후 로그인 상태에 따라 자동 라우팅"
    role: common
    pencil_id: 75vDs
    spec_file: docs/ui-specs/splash.md
    nav_to: [login, customer-home, owner-dashboard]
    nav_from: []

  login:
    name: "로그인"
    description: "소셜 로그인 (카카오/네이버/Gmail)"
    role: common
    pencil_id: hI7MJ
    spec_file: docs/ui-specs/login.md
    nav_to: [customer-home, owner-dashboard, profile-setup]
    nav_from: [splash]

  profile-setup:
    name: "프로필 설정"
    description: "소셜 로그인 후 신규 사용자 역할/이름/연락처 입력"
    role: common
    pencil_id: s2pzz
    spec_file: docs/ui-specs/signup.md
    nav_to: [customer-home, owner-shop-signup]
    nav_from: [login]

  owner-shop-signup:
    name: "샵 등록"
    description: "사장님 가입 2단계 - 샵 기본 정보 등록"
    role: shop_owner
    pencil_id: PdstH
    spec_file: docs/ui-specs/shop-signup.md
    nav_to: [owner-dashboard]
    nav_from: [profile-setup]

  # ─── 고객 흐름 ───
  customer-home:
    name: "고객 홈"
    description: "진행 중 작업 목록 및 요약 통계"
    role: customer
    pencil_id: 0b6dS
    spec_file: docs/ui-specs/customer-home.md
    nav_to: [customer-order-detail, customer-shop-search, customer-order-history, customer-mypage]
    nav_from: [login, profile-setup, splash]

  customer-order-detail:
    name: "작업 상세"
    description: "거트 작업의 상세 정보 및 진행 상태"
    role: customer
    pencil_id: l7Ghq
    spec_file: docs/ui-specs/order-detail.md
    nav_to: []
    nav_from: [customer-home, customer-order-history]

  customer-order-history:
    name: "작업 이력"
    description: "완료된 거트 작업 이력 목록"
    role: customer
    pencil_id: cdfXb
    spec_file: docs/ui-specs/order-history.md
    nav_to: [customer-order-detail]
    nav_from: [customer-home]

  customer-shop-search:
    name: "주변 샵 검색"
    description: "네이버 지도 기반 주변 거트 샵 검색"
    role: customer
    pencil_id: KMb0t
    spec_file: docs/ui-specs/shop-search.md
    nav_to: [customer-shop-detail]
    nav_from: [customer-home]

  customer-shop-detail:
    name: "샵 상세"
    description: "샵 정보, 공지/이벤트/재고 탭"
    role: customer
    pencil_id: S4mUF
    spec_file: docs/ui-specs/shop-detail.md
    nav_to: []
    nav_from: [customer-shop-search]

  customer-mypage:
    name: "마이페이지"
    description: "내 정보 확인 및 설정"
    role: customer
    pencil_id: xz11L
    spec_file: docs/ui-specs/mypage.md
    nav_to: [login]
    nav_from: [customer-home]

  # ─── 사장님 흐름 ───
  owner-dashboard:
    name: "사장님 대시보드"
    description: "작업 통계, 최근 작업 목록, 빠른 접수"
    role: shop_owner
    pencil_id: ExImm
    spec_file: docs/ui-specs/owner-dashboard.md
    nav_to: [owner-order-create, owner-order-manage, owner-member-list, owner-shop-settings]
    nav_from: [login, owner-shop-signup, splash]

  owner-order-create:
    name: "작업 접수"
    description: "새 거트 작업 접수 (회원 선택 + 작업 정보)"
    role: shop_owner
    pencil_id: HEBtI
    spec_file: docs/ui-specs/order-create.md
    nav_to: []
    nav_from: [owner-dashboard, owner-order-manage]

  owner-order-manage:
    name: "작업 관리"
    description: "전체 작업 목록 필터링 및 상태 관리"
    role: shop_owner
    pencil_id: UVpp2
    spec_file: docs/ui-specs/order-manage.md
    nav_to: [owner-order-create]
    nav_from: [owner-dashboard]

  owner-member-list:
    name: "회원 관리"
    description: "등록 회원 목록 검색 및 관리"
    role: shop_owner
    pencil_id: CpHGp
    spec_file: docs/ui-specs/member-list.md
    nav_to: []
    nav_from: [owner-dashboard]

  owner-shop-settings:
    name: "샵 설정"
    description: "샵 정보 수정 및 관리 메뉴"
    role: shop_owner
    pencil_id: qQBpR
    spec_file: docs/ui-specs/shop-settings.md
    nav_to: [owner-shop-qr, owner-post-create, owner-inventory-manage]
    nav_from: [owner-dashboard]

  owner-shop-qr:
    name: "샵 QR코드"
    description: "고객용 QR코드 생성 및 공유"
    role: shop_owner
    pencil_id: PYHid
    spec_file: docs/ui-specs/shop-qr.md
    nav_to: []
    nav_from: [owner-shop-settings]

  owner-post-create:
    name: "게시글 작성"
    description: "공지사항/이벤트 게시글 작성"
    role: shop_owner
    pencil_id: zQq8F
    spec_file: docs/ui-specs/post-create.md
    nav_to: []
    nav_from: [owner-shop-settings]

  owner-inventory-manage:
    name: "재고 관리"
    description: "거트 스트링 재고 등록 및 관리"
    role: shop_owner
    pencil_id: frCH8
    spec_file: docs/ui-specs/inventory-manage.md
    nav_to: []
    nav_from: [owner-shop-settings]
