name: badminton_app
description: 거트알림 - 배드민턴 거트 작업 알림 서비스
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # BaaS / DB
  supabase_flutter: ^2.8.0

  # 상태 관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 네비게이션
  go_router: ^14.6.2

  # Firebase (FCM)
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

  # 소셜 로그인
  kakao_flutter_sdk: ^1.9.7
  sign_in_with_apple: ^6.1.3
  google_sign_in: ^6.2.2

  # 지도
  flutter_naver_map: ^1.3.0

  # 이미지
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # QR 코드
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # 직렬화 / 불변 데이터
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 딥링크
  app_links: ^6.4.0

  # 유틸리티
  intl: ^0.20.2
  url_launcher: ^6.3.1
  flutter_local_notifications: ^18.0.1
  http: ^1.6.0
  webview_flutter: ^4.13.1
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 코드 생성
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3

  # 테스트
  mocktail: ^1.0.4

  # 통합 테스트
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Thin.otf
          weight: 100
        - asset: assets/fonts/Pretendard-ExtraLight.otf
          weight: 200
        - asset: assets/fonts/Pretendard-Light.otf
          weight: 300
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.otf
          weight: 800
        - asset: assets/fonts/Pretendard-Black.otf
          weight: 900
